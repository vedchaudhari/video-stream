services:
  postgres:
    image: postgres:16-alpine
    container_name: video_postgres
    restart: always
    command: -p 5555
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_stream
    ports:
      - "5433:5555"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: video_redis
    restart: always
    command: redis-server --requirepass redispassword --appendonly yes --port 6378
    ports: 
      - "6370:6378"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo
    container_name: video_mongodb
    restart: always
    command: mongod --port 2700
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: video_stream
    ports:
      - "2713:2700"
    volumes:
      - mongo_data:/data/db
    
volumes:
  postgres_data:
  redis_data:
  mongo_data: